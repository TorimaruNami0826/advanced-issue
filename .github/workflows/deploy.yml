name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: テスト実行
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Node.js 20 セットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: 依存パッケージインストール
        run: npm ci
      - name: テスト実行
        run: npm run test:ci

  deploy:
    name: EC2デプロイ
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: SSH鍵を設定する
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2_key
          chmod 600 ~/.ssh/ec2_key
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts
      - name: ファイルをEC2に転送する（rsync）
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/ec2_key" \
            --exclude='.env' \
            --exclude='node_modules/' \
            --exclude='coverage/' \
            --exclude='.git/' \
            ./ \
            "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/opt/advanced-issue/"
      - name: 依存パッケージ更新・マイグレーション・再起動
        run: |
          ssh -i ~/.ssh/ec2_key \
            "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" << 'ENDSSH'
            set -e
            cd /opt/advanced-issue
            npm ci --omit=dev
            npm run migrate
            pm2 reload ecosystem.config.js --env production 2>/dev/null \
              || pm2 start ecosystem.config.js --env production
            pm2 save
          ENDSSH
