<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>担当者管理</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
  <a class="back-link" href="index.html">← 一覧に戻る</a>
  <h1>担当者管理</h1>

  <!-- エラー／成功メッセージ表示エリア -->
  <p id="error-msg" class="error-msg"></p>
  <p id="success-msg" style="color:#27ae60;background:#e8f5e9;border:1px solid #a5d6a7;
     border-radius:4px;padding:8px 12px;margin:8px 0;display:none;"></p>

  <!-- 担当者登録フォーム -->
  <p class="section-title">新規担当者登録</p>
  <div class="form-card">
    <form id="assignee-form" novalidate>
      <div class="form-group">
        <label for="assignee-name">担当者名 <span style="color:#c0392b">*</span></label>
        <input type="text" id="assignee-name" maxlength="100"
          placeholder="担当者名を入力してください（100文字以内）" required>
      </div>
      <button type="submit" class="btn btn-primary">登録する</button>
    </form>
  </div>

  <!-- 担当者一覧 -->
  <p class="section-title">登録済み担当者</p>
  <table>
    <thead>
      <tr>
        <th style="width:80px">ID</th>
        <th>担当者名</th>
      </tr>
    </thead>
    <tbody id="assignee-tbody">
      <tr><td colspan="2" style="text-align:center;color:#888;">読み込み中...</td></tr>
    </tbody>
  </table>
</div>

<script>
  const errEl     = document.getElementById('error-msg');
  const successEl = document.getElementById('success-msg');

  function showError(msg) {
    errEl.textContent = msg;
    successEl.style.display = 'none';
  }
  function clearError() {
    errEl.textContent = '';
  }
  function showSuccess(msg) {
    successEl.textContent = msg;
    successEl.style.display = 'block';
    errEl.textContent = '';
    // 3秒後に自動的に非表示にする
    setTimeout(() => { successEl.style.display = 'none'; }, 3000);
  }

  // 担当者一覧を取得してテーブルに描画する
  async function loadAssignees() {
    const tbody = document.getElementById('assignee-tbody');
    try {
      const res = await fetch('/api/assignees');
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.error || '担当者一覧の取得に失敗しました');
      }
      const data = await res.json();

      if (data.length === 0) {
        tbody.innerHTML = '<tr><td colspan="2" style="text-align:center;color:#888;">担当者が登録されていません</td></tr>';
        return;
      }

      tbody.innerHTML = data.map(a => `
        <tr>
          <td>${a.assignees_id}</td>
          <td>${escapeHtml(a.assignees_name)}</td>
        </tr>
      `).join('');
    } catch (e) {
      tbody.innerHTML = `<tr><td colspan="2" style="text-align:center;color:#c0392b;">${e.message}</td></tr>`;
    }
  }

  // XSS対策のHTMLエスケープ
  function escapeHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  // 担当者登録フォームの送信処理
  document.getElementById('assignee-form').addEventListener('submit', async e => {
    e.preventDefault();
    clearError();

    const assignees_name = document.getElementById('assignee-name').value.trim();

    if (!assignees_name) {
      showError('担当者名は必須です');
      return;
    }

    try {
      const res = await fetch('/api/assignees', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ assignees_name }),
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.error || '登録に失敗しました');
      }

      const created = await res.json();
      showSuccess(`「${created.assignees_name}」を登録しました`);

      // フォームをリセットして一覧を更新する
      document.getElementById('assignee-name').value = '';
      await loadAssignees();
    } catch (e) {
      showError(e.message);
    }
  });

  // 初期表示
  loadAssignees();
</script>
</body>
</html>
